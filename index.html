<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sherlyn's Virtual Library</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400;1,600&family=Crimson+Pro:ital,wght@0,300;0,400;0,500;1,300;1,400&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --gold:       #b8822a;
      --gold-light: #d4a84e;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { min-height: 100vh; font-family: 'Crimson Pro', Georgia, serif; overflow-x: hidden; position: relative; }

    /* ══ PALE NORDIC OAK / PINE BACKGROUND ══ */
    body::before {
      content: ''; position: fixed; inset: 0; z-index: -2;
      background-color: #e8d9b4;
      background-image:
        repeating-linear-gradient(89deg,
          transparent 0px, transparent 22px,
          rgba(130,85,20,0.05) 22px, rgba(130,85,20,0.05) 23px,
          transparent 23px, transparent 45px,
          rgba(200,160,70,0.065) 45px, rgba(200,160,70,0.065) 46px),
        repeating-linear-gradient(90.5deg,
          transparent 0px, transparent 72px,
          rgba(95,60,10,0.04) 72px, rgba(95,60,10,0.04) 75px,
          transparent 75px, transparent 135px,
          rgba(215,180,95,0.06) 135px, rgba(215,180,95,0.06) 137px),
        repeating-linear-gradient(89.8deg,
          rgba(252,238,200,0.28) 0px, rgba(234,214,158,0.32) 55px,
          rgba(255,242,205,0.22) 110px, rgba(226,204,148,0.3) 175px,
          rgba(250,232,180,0.25) 235px, rgba(220,196,138,0.27) 295px),
        linear-gradient(172deg, #f4e4c0 0%, #ecd6a2 22%, #f6e2bc 42%, #e0ca98 60%, #ecd8aa 78%, #e2cc9c 100%);
    }
    body::after {
      content: ''; position: fixed; inset: 0; z-index: -1; opacity: 0.032;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size: 256px;
    }

    /* ══ HEADER ══ */
    .header { text-align: center; padding: 52px 24px 36px; position: relative; z-index: 1; }
    .header-plate {
      display: inline-block;
      background: linear-gradient(135deg, #2e1c08 0%, #3d2812 50%, #281606 100%);
      border: 1px solid rgba(180,130,50,0.4); border-radius: 4px;
      padding: 28px 56px 24px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.32), inset 0 1px 0 rgba(255,200,100,0.09);
      position: relative;
    }
    .header-plate::before { content:'◆'; position:absolute; top:8px; left:12px; color:var(--gold-light); font-size:10px; opacity:.5; }
    .header-plate::after  { content:'◆'; position:absolute; bottom:8px; right:12px; color:var(--gold-light); font-size:10px; opacity:.5; }
    .header-kicker   { color:var(--gold-light); font-size:11px; letter-spacing:6px; text-transform:uppercase; opacity:.75; margin-bottom:8px; display:block; }
    .header-name     { font-family:'Playfair Display',serif; font-size:clamp(26px,5vw,50px); font-style:italic; color:#f5e0b0; letter-spacing:1px; line-height:1.1; text-shadow:0 2px 12px rgba(0,0,0,.4); }
    .header-subtitle { color:var(--gold); font-size:11px; letter-spacing:4px; text-transform:uppercase; margin-top:10px; opacity:.65; }
    .header-rule     { display:flex; align-items:center; gap:12px; margin-top:14px; justify-content:center; }
    .header-rule span{ width:50px; height:1px; background:linear-gradient(90deg,transparent,var(--gold)); }
    .header-rule span:last-child { transform:scaleX(-1); }
    .header-rule em  { color:var(--gold); font-size:14px; font-style:normal; opacity:.65; }

    /* ══ BOOKCASE ══ */
    .bookcase-wrap { display:flex; flex-direction:column; align-items:center; padding:0 24px 80px; }
    .shelf-unit {
      width:100%; max-width:1100px;
      background: linear-gradient(180deg,#2e1c0a 0%,#1e1006 100%);
      border-radius:6px;
      box-shadow: 0 20px 60px rgba(0,0,0,.52), 0 4px 16px rgba(0,0,0,.38), inset 0 1px 0 rgba(255,200,100,.055);
      border:1px solid rgba(75,42,8,.55); padding:32px 32px 0; position:relative;
    }
    .shelf-unit::before {
      content:''; position:absolute; inset:0; border-radius:6px; pointer-events:none;
      background-image: repeating-linear-gradient(92deg,
        transparent 0px,transparent 30px,rgba(255,180,80,.022) 30px,rgba(255,180,80,.022) 31px,
        transparent 31px,transparent 62px,rgba(0,0,0,.038) 62px,rgba(0,0,0,.038) 63px);
    }

    .shelf-label {
      color:#7a5525; font-size:9px; letter-spacing:4px; text-transform:uppercase;
      margin-bottom:16px; padding-left:6px; position:relative; z-index:1;
      font-family:'Crimson Pro',serif; display:flex; align-items:center; gap:10px;
    }
    .shelf-label::before,.shelf-label::after { content:''; flex:1; height:1px; background:linear-gradient(90deg,rgba(115,72,22,.4),transparent); }
    .shelf-label::before { max-width:24px; }

    .books-grid { display:flex; flex-wrap:wrap; gap:14px; padding:0 4px; position:relative; z-index:1; }

    /* ══ FRONT-FACING BOOK ══ */
    .book { width:90px; flex-shrink:0; cursor:pointer; position:relative; transition:transform .25s cubic-bezier(.34,1.4,.64,1); transform-origin:bottom center; }
    .book:hover  { transform:translateY(-10px) scale(1.04); }
    .book.active { transform:translateY(-14px) scale(1.06); }

    .book-cover {
      width:90px; height:132px; border-radius:2px 5px 5px 2px;
      overflow:hidden; position:relative;
      box-shadow: 4px 5px 14px rgba(0,0,0,.65), -1px 0 0 rgba(0,0,0,.4), inset -2px 0 4px rgba(0,0,0,.12);
    }
    .book-cover::before { content:''; position:absolute; left:0; top:0; bottom:0; width:6px; background:linear-gradient(90deg,rgba(0,0,0,.42),rgba(0,0,0,.07)); z-index:3; border-right:1px solid rgba(0,0,0,.12); }
    .book-cover::after  { content:''; position:absolute; inset:0; z-index:2; background:linear-gradient(135deg,rgba(255,255,255,.1) 0%,transparent 50%,rgba(0,0,0,.055) 100%); pointer-events:none; }
    .book-cover img { width:100%; height:100%; object-fit:cover; display:none; position:relative; z-index:1; }

    /* shimmer while loading */
    .book-cover { background:linear-gradient(90deg,#2a1808 25%,#3a2510 50%,#2a1808 75%); background-size:200% 100%; animation:shimmer 1.5s infinite; }
    .book-cover.loaded { animation:none; }
    @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

    .book-cover-fallback { position:absolute; inset:0; z-index:1; display:none; flex-direction:column; align-items:center; justify-content:center; padding:10px 8px; text-align:center; }
    .fb-line   { height:2px; width:28px; margin-bottom:8px; }
    .fb-title  { font-size:7px; font-weight:600; letter-spacing:.5px; text-transform:uppercase; line-height:1.3; font-family:'Crimson Pro',serif; }
    .fb-author { font-size:6.5px; font-style:italic; margin-top:5px; opacity:.75; font-family:'Crimson Pro',serif; }

    .book-label { margin-top:7px; text-align:center; }
    .book-label-title { display:block; font-size:9px; font-weight:600; color:#c8963c; line-height:1.3; font-family:'Crimson Pro',serif; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:90px; }
    .book-label-year  { display:block; font-size:8px; color:#7a5525; margin-top:1px; font-style:italic; }

    .book.active .book-cover { box-shadow:4px 5px 14px rgba(0,0,0,.65),-1px 0 0 rgba(0,0,0,.4),0 0 0 2px var(--gold),0 0 18px rgba(184,130,42,.42); }

    .shelf-gap   { height:24px; }
    .shelf-plank { height:22px; background:linear-gradient(180deg,#5c3c1a 0%,#3e2712 55%,#2c1c08 100%); margin:10px -32px 0; position:relative; box-shadow:0 8px 24px rgba(0,0,0,.62),0 2px 4px rgba(0,0,0,.32); border-top:2px solid rgba(145,90,28,.32); }
    .shelf-plank::before { content:''; position:absolute; inset:0; background:repeating-linear-gradient(90deg,transparent,transparent 60px,rgba(0,0,0,.038) 60px,rgba(0,0,0,.038) 61px); }
    .shelf-plank::after  { content:''; position:absolute; top:0; left:0; right:0; height:2px; background:linear-gradient(90deg,transparent,rgba(195,135,55,.18),transparent); }

    .hint { text-align:center; margin-top:22px; color:rgba(75,45,8,.58); font-size:11px; letter-spacing:3px; text-transform:uppercase; animation:pulse 2.5s ease-in-out infinite; font-family:'Crimson Pro',serif; }

    /* ══ DETAIL PANEL ══ */
    #detail-panel { display:none; width:100%; max-width:1100px; margin-top:28px; background:linear-gradient(135deg,#fdf5e4 0%,#f5e8ce 100%); border-radius:8px; box-shadow:0 20px 60px rgba(0,0,0,.32),0 0 0 1px rgba(115,72,22,.2),inset 0 1px 0 rgba(255,255,255,.5); overflow:hidden; position:relative; }
    #detail-panel.visible { display:flex; animation:slideUp .35s cubic-bezier(.34,1.4,.64,1); }

    .dp-cover { width:260px; flex-shrink:0; position:relative; overflow:hidden; display:flex; flex-direction:column; align-items:center; justify-content:flex-end; padding:32px 24px 28px; min-height:380px; }
    .dp-cover-bg      { position:absolute; inset:0; background-size:cover; background-position:center; filter:blur(20px) brightness(.33) saturate(1.3); transform:scale(1.15); }
    .dp-cover-overlay { position:absolute; inset:0; background:linear-gradient(180deg,rgba(12,6,2,.3),rgba(12,6,2,.55)); }
    .dp-cover-img     { position:relative; z-index:2; width:150px; height:220px; object-fit:cover; border-radius:2px 6px 6px 2px; box-shadow:8px 8px 28px rgba(0,0,0,.7),-2px 0 0 rgba(0,0,0,.4); }
    .dp-cover-fallback{ position:relative; z-index:2; width:150px; height:220px; border-radius:2px 6px 6px 2px; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:16px; text-align:center; box-shadow:8px 8px 28px rgba(0,0,0,.7); }
    .dp-fb-bar  { height:3px; width:36px; margin-bottom:12px; }
    .dp-fb-title{ font-size:10px; font-weight:600; letter-spacing:.8px; text-transform:uppercase; line-height:1.4; margin-bottom:8px; font-family:'Crimson Pro',serif; }
    .dp-fb-bar2 { height:1px; width:20px; margin:4px 0; opacity:.5; }
    .dp-fb-author{font-size:8.5px; font-style:italic; margin-top:6px; font-family:'Crimson Pro',serif; }

    .dp-badge { position:relative; z-index:2; margin-top:18px; background:rgba(0,0,0,.5); border:1px solid rgba(184,130,42,.35); border-radius:3px; padding:6px 14px; text-align:center; width:100%; max-width:160px; }
    .dp-badge-label { color:var(--gold-light); font-size:8px; letter-spacing:3px; text-transform:uppercase; display:block; font-family:'Crimson Pro',serif; }
    .dp-badge-year  { color:#fff; font-size:20px; font-style:italic; font-family:'Playfair Display',serif; display:block; line-height:1.2; }

    .dp-text { padding:38px 44px; flex:1; overflow-y:auto; max-height:500px; }
    .dp-text::-webkit-scrollbar { width:4px; }
    .dp-text::-webkit-scrollbar-thumb { background:var(--gold); border-radius:2px; }

    .dp-meta    { color:var(--gold); font-size:10px; letter-spacing:4px; text-transform:uppercase; margin-bottom:8px; font-family:'Crimson Pro',serif; }
    .dp-title   { color:#2a1605; font-family:'Playfair Display',serif; font-size:clamp(20px,2.8vw,30px); font-style:italic; line-height:1.25; margin-bottom:6px; }
    .dp-award   { display:inline-flex; align-items:center; gap:8px; background:linear-gradient(90deg,rgba(184,130,42,.1),rgba(184,130,42,.05)); border:1px solid rgba(184,130,42,.3); border-radius:3px; padding:5px 12px; margin:14px 0 22px; }
    .trophy     { font-size:14px; }
    .award-text { color:#7a5820; font-size:10px; letter-spacing:2px; text-transform:uppercase; font-family:'Crimson Pro',serif; }
    .dp-divider { height:1px; background:linear-gradient(90deg,#d4b896,transparent); margin-bottom:22px; }
    .dp-summary { color:#4a3218; font-size:16px; line-height:1.85; margin-bottom:28px; font-family:'Crimson Pro',serif; }
    .dp-insights-label { color:var(--gold); font-size:10px; letter-spacing:3px; text-transform:uppercase; margin-bottom:16px; font-family:'Crimson Pro',serif; }
    .dp-insights { list-style:none; }
    .dp-insights li { display:flex; gap:12px; align-items:flex-start; margin-bottom:12px; color:#3d2810; font-size:15px; line-height:1.65; font-family:'Crimson Pro',serif; }
    .gem { font-size:11px; line-height:1.8; flex-shrink:0; }

    .close-btn { position:absolute; top:14px; right:14px; z-index:10; background:rgba(0,0,0,.07); border:1px solid rgba(0,0,0,.1); border-radius:50%; width:32px; height:32px; cursor:pointer; color:#7a5a30; font-size:20px; display:flex; align-items:center; justify-content:center; transition:background .2s; font-family:serif; line-height:1; }
    .close-btn:hover { background:rgba(0,0,0,.14); }

    @keyframes pulse   { 0%,100%{opacity:.38} 50%{opacity:.82} }
    @keyframes slideUp { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }

    @media(max-width:700px){
      .books-grid { gap:10px; }
      .book,.book-cover { width:74px; }
      .book-cover { height:108px; }
      .book-label-title { max-width:74px; }
      #detail-panel.visible { flex-direction:column; }
      .dp-cover { width:100%; min-height:220px; flex-direction:row; gap:20px; padding:20px; justify-content:center; align-items:center; }
      .dp-cover-img,.dp-cover-fallback { width:110px; height:160px; }
      .dp-text { padding:24px 20px; max-height:none; }
      .header-plate { padding:22px 28px 18px; }
    }
  </style>
</head>
<body>

<div class="header">
  <div class="header-plate">
    <span class="header-kicker">A Personal Collection</span>
    <h1 class="header-name">Sherlyn's Virtual Library</h1>
    <p class="header-subtitle">Economics &amp; Global Affairs</p>
    <div class="header-rule"><span></span><em>✦</em><span></span></div>
  </div>
</div>

<div class="bookcase-wrap">
  <div class="shelf-unit">
    <div class="shelf-label">FT Business Book of the Year &middot; 2015–2024</div>
    <div class="books-grid" id="grid-ft"></div>
    <div class="shelf-plank"></div>
    <div class="shelf-gap"></div>
    <div class="shelf-label">Essential Reading &middot; Economics &amp; Global Affairs</div>
    <div class="books-grid" id="grid-picks"></div>
    <div class="shelf-plank"></div>
  </div>

  <p class="hint" id="hint">&#8593; tap any cover to explore the book</p>

  <div id="detail-panel">
    <div class="dp-cover">
      <div class="dp-cover-bg" id="dp-bg"></div>
      <div class="dp-cover-overlay"></div>
      <img class="dp-cover-img" id="dp-img" src="" alt=""
           onerror="this.style.display='none';document.getElementById('dp-fallback').style.display='flex'"/>
      <div class="dp-cover-fallback" id="dp-fallback" style="display:none">
        <div class="dp-fb-bar" id="dp-fb-bar"></div>
        <p class="dp-fb-title" id="dp-fb-title"></p>
        <div class="dp-fb-bar2" id="dp-fb-bar2"></div>
        <p class="dp-fb-author" id="dp-fb-author"></p>
      </div>
      <div class="dp-badge">
        <span class="dp-badge-label" id="dp-badge-label"></span>
        <span class="dp-badge-year"  id="dp-badge-year"></span>
      </div>
    </div>
    <div class="dp-text">
      <p  class="dp-meta"        id="dp-meta"></p>
      <h2 class="dp-title"       id="dp-title"></h2>
      <div class="dp-award">
        <span class="trophy"     id="dp-trophy"></span>
        <span class="award-text" id="dp-award-text"></span>
      </div>
      <div class="dp-divider"></div>
      <p class="dp-summary"      id="dp-summary"></p>
      <p class="dp-insights-label">Key Insights</p>
      <ul class="dp-insights"    id="dp-insights"></ul>
    </div>
    <button class="close-btn" id="close-btn">&times;</button>
  </div>
</div>

<script>
const ftBooks = [
  { id:'ft1',  year:2015, title:"Rise of the Robots",   author:"Martin Ford",            isbn:"9780465059997", spine:{bg:"#1a2e4a",text:"#e0eaf5",accent:"#4a9fd4"}, badge:"FT Book of the Year", badgeYear:"2015", trophy:"🏆", summary:"Ford argues that accelerating automation and AI will soon render vast swaths of employment obsolete. Unlike past technological revolutions, this wave threatens to hollow out the middle class and widen inequality—unless societies rethink income distribution itself.", insights:["AI and robots are moving beyond routine tasks into creative and cognitive work","Traditional job creation from innovation will not keep pace with displacement","A guaranteed basic income may become a necessary policy response","Higher education offers diminishing protection from automation"] },
  { id:'ft2',  year:2016, title:"The Man Who Knew",     author:"Sebastian Mallaby",      isbn:"9781594204098", spine:{bg:"#2e2010",text:"#f5e8cc",accent:"#c8902a"}, badge:"FT Book of the Year", badgeYear:"2016", trophy:"🏆", summary:"A definitive biography of Alan Greenspan, Fed chairman for nearly two decades. Mallaby shows how a libertarian intellectual became the world's most powerful economic technocrat—and how his faith in self-regulating markets, despite private doubts, contributed to the 2008 financial crisis.", insights:["Greenspan privately acknowledged market failures he refused to act on publicly","The cult of the all-knowing central banker is inherently dangerous","Financial deregulation in the 1990s sowed the seeds of the 2008 crash","Ideology can corrupt even technically sophisticated policymakers"] },
  { id:'ft3',  year:2017, title:"Janesville",           author:"Amy Goldstein",          isbn:"9781501102264", spine:{bg:"#3b2215",text:"#f0e0cc",accent:"#d97c3a"}, badge:"FT Book of the Year", badgeYear:"2017", trophy:"🏆", summary:"An intimate chronicle of Janesville, Wisconsin after GM closed its plant in 2008. Goldstein spent years documenting what happened to workers and families—revealing how retraining programs often fail, how the safety net frays, and how deindustrialisation reshapes communities for generations.", insights:["Retraining programs rarely restore workers to pre-layoff income levels","Community dislocation ripples across health, education and social trust","The pain of deindustrialisation is political as well as economic","Policy responses to job loss often reflect ideology over evidence"] },
  { id:'ft4',  year:2018, title:"Bad Blood",            author:"John Carreyrou",         isbn:"9781524731656", spine:{bg:"#6b0f0f",text:"#fde8e8",accent:"#e84040"}, badge:"FT Book of the Year", badgeYear:"2018", trophy:"🏆", summary:"The explosive exposé of Theranos, the Silicon Valley blood-testing startup that defrauded investors, patients and partners for years. Carreyrou reveals how Elizabeth Holmes weaponised secrecy, charisma and fear to build a $9 billion company on a lie.", insights:["Charisma and storytelling can substitute for product reality far longer than expected","Boards failed by not demanding basic scientific verification","Disruption ideology can silence legitimate safety and ethical concerns","Whistleblowers face enormous personal risk to expose corporate wrongdoing"] },
  { id:'ft5',  year:2019, title:"Invisible Women",      author:"Caroline Criado Perez",  isbn:"9781419732553", spine:{bg:"#8b1a5a",text:"#fce8f0",accent:"#e86aaa"}, badge:"FT Book of the Year", badgeYear:"2019", trophy:"🏆", summary:"Criado Perez exposes the gender data gap—the systematic exclusion of women from data shaping medicine, urban planning, workplace design and policy. A world built for men by default silently harms women every day, from crash-test dummies to voice recognition software.", insights:["Medical research on male subjects produces care that fails women","Cities and public spaces are designed around male default patterns","Data gaps are not neutral—their costs fall disproportionately on women","Including women in research is not a nicety but a life-or-death necessity"] },
  { id:'ft6',  year:2020, title:"No Filter",            author:"Sarah Frier",            isbn:"9781982126803", spine:{bg:"#2c1a3e",text:"#f0e8fc",accent:"#c07aec"}, badge:"FT Book of the Year", badgeYear:"2020", trophy:"🏆", summary:"The inside story of Instagram's rise to a billion users. Frier traces how founders Systrom and Krieger built a platform that transformed celebrity, beauty and commerce—and the brutal power struggle when Facebook acquired it and eventually forced them out.", insights:["Instagram redefined aspiration, beauty standards and influencer culture globally","Facebook systematically undermined Instagram's independence after acquisition","Platform power can override founders' values and product vision","The attention economy has deep psychological consequences for users"] },
  { id:'ft7',  year:2021, title:"This Is How They Tell Me the World Ends", author:"Nicole Perlroth", isbn:"9781635576054", spine:{bg:"#0a1a2e",text:"#d0e8f5",accent:"#2a8fd0"}, badge:"FT Book of the Year", badgeYear:"2021", trophy:"🏆", summary:"A gripping investigation into the global cyberweapons arms race. Perlroth reveals the shadowy market for zero-day vulnerabilities—secret software flaws governments buy and hoard—and how America's own offensive tools have been turned against it.", insights:["Governments stockpile software vulnerabilities rather than patching them","The NSA's offensive tools have leaked and armed adversaries","Private brokers profit enormously from an unregulated cyberweapons market","Critical infrastructure—hospitals, power grids, pipelines—is dangerously exposed"] },
  { id:'ft8',  year:2022, title:"Chip War",             author:"Chris Miller",           isbn:"9781982172008", spine:{bg:"#0d2b1a",text:"#d0f0e0",accent:"#3abd74"}, badge:"FT Book of the Year", badgeYear:"2022", trophy:"🏆", summary:"The definitive history of the semiconductor industry and why microchips have become the central battleground of geopolitics. Miller traces how American engineers built a global supply chain of unmatched complexity—and why chip production now determines economic and military supremacy.", insights:["Semiconductors are the oil of the modern economy","Taiwan's TSMC has an extraordinary and precarious monopoly on leading-edge chips","The US–China rivalry is fundamentally a competition over semiconductor supremacy","Decades of offshoring left Western nations dangerously dependent on Asian fabs"] },
  { id:'ft9',  year:2023, title:"Right Kind of Wrong",  author:"Amy Edmondson",          isbn:"9781982195069", spine:{bg:"#1e3a1e",text:"#e0f0e0",accent:"#5ab85a"}, badge:"FT Book of the Year", badgeYear:"2023", trophy:"🏆", summary:"Harvard professor Edmondson reframes our relationship with failure. Not all failure is equal: intelligent failure arises from thoughtful experiments in uncertain terrain. She provides a science-based framework for distinguishing productive from wasteful failure.", insights:["Intelligent failure happens at the frontier of knowledge and should be celebrated","Psychological safety is the precondition for teams to learn from mistakes","'Fail fast' mantras are misapplied—quality of failure matters, not just speed","Leaders who admit errors create more resilient organisations"] },
  { id:'ft10', year:2024, title:"Supremacy",            author:"Parmy Olson",            isbn:"9781250337689", spine:{bg:"#10101e",text:"#d0d8f8",accent:"#6070f0"}, badge:"FT Book of the Year", badgeYear:"2024", trophy:"🏆", summary:"The behind-the-scenes story of the rivalry between OpenAI and Google DeepMind and the two men at their centre: Sam Altman and Demis Hassabis. Olson reveals how idealistic researchers became swept up in a race for dominance that may define civilisation.", insights:["The AI arms race has transformed safety-focused labs into commercial competitors","Personal ambition routinely overrides stated ethical commitments","Microsoft's investment reshaped OpenAI from a nonprofit ideal into a juggernaut","Who controls transformative AI is ultimately a question about political power"] }
];

/* ── Cover fetching via Google Books API (client-side) ── */
const coverCache = {};

async function fetchCover(isbn) {
  if (coverCache[isbn] !== undefined) return coverCache[isbn];
  try {
    const res = await fetch(
      `https://www.googleapis.com/books/v1/volumes?q=isbn:${isbn}&fields=items(volumeInfo/imageLinks)`
    );
    const data = await res.json();
    const links = data?.items?.[0]?.volumeInfo?.imageLinks;
    let url = links?.thumbnail || links?.smallThumbnail || null;
    if (url) {
      url = url.replace('zoom=1', 'zoom=2').replace('&edge=curl', '').replace('http://', 'https://');
    }
    coverCache[isbn] = url;
    return url;
  } catch {
    coverCache[isbn] = null;
    return null;
  }
}

/* ── Build grids ── */
function buildGrid(books, gridId) {
  const grid = document.getElementById(gridId);
  books.forEach(b => {
    const wrap = document.createElement('div');
    wrap.className = 'book'; wrap.dataset.id = b.id;
    wrap.title = `${b.title} — ${b.author}`;

    const coverDiv = document.createElement('div');
    coverDiv.className = 'book-cover';
    coverDiv.style.background = b.spine.bg;

    const img = document.createElement('img'); img.alt = b.title;

    const fb = document.createElement('div');
    fb.className = 'book-cover-fallback'; fb.style.background = b.spine.bg;
    fb.innerHTML = `<div class="fb-line" style="background:${b.spine.accent}"></div>
      <span class="fb-title" style="color:${b.spine.text}">${b.title}</span>
      <span class="fb-author" style="color:${b.spine.text}">${b.author}</span>`;

    img.onload  = () => { coverDiv.classList.add('loaded'); img.style.display = 'block'; };
    img.onerror = () => { coverDiv.classList.add('loaded'); fb.style.display = 'flex'; };

    coverDiv.appendChild(img); coverDiv.appendChild(fb);

    fetchCover(b.isbn).then(url => {
      if (url) img.src = url;
      else { coverDiv.classList.add('loaded'); fb.style.display = 'flex'; }
    });

    const label = document.createElement('div'); label.className = 'book-label';
    label.innerHTML = `<span class="book-label-title">${b.title}</span><span class="book-label-year">${b.year}</span>`;

    wrap.appendChild(coverDiv); wrap.appendChild(label);
    wrap.addEventListener('click', () => toggleBook(b));
    grid.appendChild(wrap);
  });
}

buildGrid(ftBooks, 'grid-ft');
buildGrid(pickBooks, 'grid-picks');

/* ── Detail panel ── */
let activeId = null;

function toggleBook(b) {
  const panel = document.getElementById('detail-panel');
  const hint  = document.getElementById('hint');
  if (activeId === b.id) {
    activeId = null; panel.classList.remove('visible'); hint.style.display = '';
    document.querySelectorAll('.book').forEach(el => el.classList.remove('active')); return;
  }
  activeId = b.id; hint.style.display = 'none';
  document.querySelectorAll('.book').forEach(el => el.classList.toggle('active', el.dataset.id === b.id));

  const imgEl = document.getElementById('dp-img');
  const fbEl  = document.getElementById('dp-fallback');
  imgEl.style.display = 'block'; fbEl.style.display = 'none';

  imgEl.onerror = () => {
    imgEl.style.display = 'none'; fbEl.style.display = 'flex';
    fbEl.style.background = b.spine.bg; fbEl.style.border = `2px solid ${b.spine.accent}`;
    document.getElementById('dp-fb-bar').style.background   = b.spine.accent;
    document.getElementById('dp-fb-bar2').style.background  = b.spine.accent;
    document.getElementById('dp-fb-title').textContent      = b.title;
    document.getElementById('dp-fb-title').style.color      = b.spine.text;
    document.getElementById('dp-fb-author').textContent     = b.author;
    document.getElementById('dp-fb-author').style.color     = b.spine.text + 'aa';
  };

  const setDP = (url) => {
    if (!url) { imgEl.onerror(); return; }
    const big = url.replace('zoom=2','zoom=3').replace('zoom=1','zoom=3');
    document.getElementById('dp-bg').style.backgroundImage = `url(${big})`;
    imgEl.src = big;
  };

  coverCache[b.isbn] !== undefined ? setDP(coverCache[b.isbn]) : fetchCover(b.isbn).then(setDP);

  document.getElementById('dp-badge-label').textContent = b.badge;
  document.getElementById('dp-badge-year').textContent  = b.badgeYear;
  document.getElementById('dp-meta').textContent        = `${b.year} · ${b.author}`;
  document.getElementById('dp-title').textContent       = b.title;
  document.getElementById('dp-trophy').textContent      = b.trophy || '🏆';
  document.getElementById('dp-award-text').textContent  = `${b.badge} ${b.badgeYear}`;
  document.getElementById('dp-summary').textContent     = b.summary;

  const ul = document.getElementById('dp-insights'); ul.innerHTML = '';
  b.insights.forEach(ins => {
    const li = document.createElement('li');
    li.innerHTML = `<span class="gem" style="color:${b.spine.accent}">◆</span>${ins}`;
    ul.appendChild(li);
  });

  panel.classList.remove('visible'); void panel.offsetWidth; panel.classList.add('visible');
  setTimeout(() => panel.scrollIntoView({ behavior:'smooth', block:'nearest' }), 60);
}

document.getElementById('close-btn').addEventListener('click', () => {
  activeId = null; document.getElementById('detail-panel').classList.remove('visible');
  document.getElementById('hint').style.display = '';
  document.querySelectorAll('.book').forEach(el => el.classList.remove('active'));
});
</script>
